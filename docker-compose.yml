services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vandura
      POSTGRES_USER: vandura
      POSTGRES_PASSWORD: vandura
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vandura"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: vandura
      MINIO_ROOT_PASSWORD: vandura123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      sleep 2 &&
      mc alias set local http://minio:9000 vandura vandura123 &&
      mc mb local/vandura-results --ignore-existing
      "

volumes:
  pgdata:
  miniodata:

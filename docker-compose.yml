services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: vandura
      MINIO_ROOT_PASSWORD: vandura123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      sleep 2 &&
      mc alias set local http://minio:9000 vandura vandura123 &&
      mc mb local/vandura-results --ignore-existing
      "

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - "ES_JAVA_OPTS=-Xms256m -Xmx256m"
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q 'status.*green\\|status.*yellow'"]
      interval: 10s
      timeout: 5s
      retries: 10

  vandura:
    build:
      context: .
      dockerfile: Dockerfile
      target: build
    command: npx tsx src/index.ts
    depends_on:
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    volumes:
      - ./src:/app/src
      - ./config:/app/config
      - claudedata:/home/vandura/.claude
    ports:
      - "3000:3000"
    environment:
      DB_TOOL_CONNECTION_URL: postgres://vandura:vandura@postgres:5432/sampledb
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      KMS_PROVIDER: local
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: vandura
      S3_SECRET_KEY: vandura123
      S3_BUCKET: vandura-results
      S3_REGION: us-east-1
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-5-20250929}
      SLACK_APP_TOKEN: ${SLACK_APP_TOKEN}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}
      SLACK_CHANNEL_ID: ${SLACK_CHANNEL_ID}
      VANDURA_MEMORY_DIR: /home/vandura/.vandura/memory
      CLAUDE_SESSIONS_DIR: /home/vandura/.claude/sessions
      CLAUDE_CODE_PATH: /usr/local/bin/claude
      CLAUDE_DEBUG: "true"
      GRAFANA_URL: ${GRAFANA_URL}
      GRAFANA_API_KEY: ${GRAFANA_API_KEY}

volumes:
  redisdata:
  miniodata:
  esdata:
  sessions:
  claudedata:

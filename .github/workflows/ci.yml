name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  test:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:coverage
      - name: Coverage report
        uses: davelosert/vitest-coverage-report-action@v2
        if: github.event_name == 'pull_request'
        with:
          json-summary-path: coverage/coverage-summary.json
          json-final-path: coverage/coverage-final.json

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  e2e-slack:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: vandura_test
          POSTGRES_USER: vandura
          POSTGRES_PASSWORD: vandura
        options: >-
          --health-cmd "pg_isready -U vandura"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Copy non-TS assets to dist
        run: cp -r src/db/migrations dist/db/migrations
      - name: Generate KMS key file
        run: openssl rand -hex 32 > .dev-master-key
      - name: Run DB migrations
        run: npx tsx src/db/migrate.ts
        env:
          DATABASE_URL: postgres://vandura:vandura@localhost:5432/vandura_test
      - name: Start Vandura service
        run: |
          node dist/index.js > /tmp/vandura.log 2>&1 &
          echo $! > /tmp/vandura.pid
          # Wait for the service to be ready (up to 60s)
          for i in $(seq 1 30); do
            if grep -q "Vandura is running!" /tmp/vandura.log 2>/dev/null; then
              echo "Vandura started successfully"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Vandura failed to start. Logs:"
              cat /tmp/vandura.log
              exit 1
            fi
            sleep 2
          done
        env:
          DATABASE_URL: postgres://vandura:vandura@localhost:5432/vandura_test
          DB_TOOL_CONNECTION_URL: postgres://vandura:vandura@localhost:5432/vandura_test
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          SLACK_APP_TOKEN: ${{ secrets.SLACK_APP_TOKEN }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          KMS_PROVIDER: local
          S3_ENDPOINT: ""
          S3_ACCESS_KEY: ""
          S3_SECRET_KEY: ""
          S3_BUCKET: ""
          S3_REGION: us-east-1
      - name: Run E2E tests
        run: npm run test:e2e:slack
        env:
          DATABASE_URL: postgres://vandura:vandura@localhost:5432/vandura_test
          DB_TOOL_CONNECTION_URL: postgres://vandura:vandura@localhost:5432/vandura_test
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          SLACK_APP_TOKEN: ${{ secrets.SLACK_APP_TOKEN }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          SLACK_USER_TOKEN: ${{ secrets.SLACK_USER_TOKEN }}
          E2E_INITIATOR_TOKEN: ${{ secrets.E2E_INITIATOR_TOKEN }}
          E2E_INITIATOR_REFRESH_TOKEN: ${{ secrets.E2E_INITIATOR_REFRESH_TOKEN }}
          E2E_CHECKER_TOKEN: ${{ secrets.E2E_CHECKER_TOKEN }}
          E2E_CHECKER_REFRESH_TOKEN: ${{ secrets.E2E_CHECKER_REFRESH_TOKEN }}
          KMS_PROVIDER: local
          S3_ENDPOINT: ""
          S3_ACCESS_KEY: ""
          S3_SECRET_KEY: ""
          S3_BUCKET: ""
          S3_REGION: us-east-1
      - name: Show Vandura logs
        if: always()
        run: cat /tmp/vandura.log 2>/dev/null || echo "No logs found"
      - name: Stop Vandura service
        if: always()
        run: kill "$(cat /tmp/vandura.pid)" 2>/dev/null || true

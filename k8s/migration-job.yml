apiVersion: batch/v1
kind: Job
metadata:
  name: vandura-migrate
  namespace: vandura
  labels:
    app: vandura
    component: migration
spec:
  ttlSecondsAfterFinished: 3600  # Clean up completed job after 1 hour
  backoffLimit: 3
  activeDeadlineSeconds: 300  # Fail if migration takes longer than 5 minutes
  template:
    spec:
      containers:
        - name: migrate
          image: ghcr.io/barockok/vandura:latest
          command: ["npm", "run", "db:migrate"]
          envFrom:
            - configMapRef:
                name: vandura-config
            - secretRef:
                name: vandura-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
      restartPolicy: Never
